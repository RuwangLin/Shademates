<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">ShadeMates heat-aware decision-support flow</title>
  <desc id="desc">Location, weather, shade and personal context inform heat-aware decision support, which leads to route comparison, cool-place discovery and safety tips.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f8f5"/>
      <stop offset="1" stop-color="#eef3ec"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#315f4c"/>
      <stop offset="1" stop-color="#497b5f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#163226" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#87a392"/>
    </marker>
  </defs>
  <rect width="1200" height="520" rx="26" fill="url(#bg)"/>
  <text x="64" y="58" fill="#244536" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Context in</text>
  <text x="974" y="58" fill="#244536" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Actions out</text>

  <g fill="none" stroke="#87a392" stroke-width="4" marker-end="url(#arrow)">
    <path d="M372 125 C440 125 438 217 500 217"/>
    <path d="M372 215 C440 215 438 235 500 235"/>
    <path d="M372 305 C440 305 438 253 500 253"/>
    <path d="M372 395 C440 395 438 271 500 271"/>
    <path d="M748 244 C815 244 818 132 878 132"/>
    <path d="M748 244 C815 244 818 244 878 244"/>
    <path d="M748 244 C815 244 818 356 878 356"/>
  </g>

  <g filter="url(#shadow)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <g fill="#ffffff" stroke="#d2ddd5" stroke-width="2">
      <rect x="64" y="88" width="308" height="74" rx="16"/>
      <rect x="64" y="178" width="308" height="74" rx="16"/>
      <rect x="64" y="268" width="308" height="74" rx="16"/>
      <rect x="64" y="358" width="308" height="74" rx="16"/>
    </g>
    <g fill="#244536" font-size="22" font-weight="600">
      <text x="90" y="133">Location &amp; destination</text>
      <text x="90" y="223">Temperature &amp; UV</text>
      <text x="90" y="313">Shade &amp; route context</text>
      <text x="90" y="403">Age group &amp; sensitivity</text>
    </g>

    <rect x="500" y="172" width="248" height="144" rx="24" fill="url(#core)"/>
    <circle cx="624" cy="215" r="18" fill="#f5c65b"/>
    <g fill="#ffffff" text-anchor="middle">
      <text x="624" y="263" font-size="24" font-weight="700">Heat-aware</text>
      <text x="624" y="293" font-size="24" font-weight="700">decision support</text>
    </g>

    <g fill="#fffaf0" stroke="#e6c76f" stroke-width="2">
      <rect x="878" y="94" width="258" height="76" rx="17"/>
      <rect x="878" y="206" width="258" height="76" rx="17"/>
      <rect x="878" y="318" width="258" height="76" rx="17"/>
    </g>
    <g fill="#554619" text-anchor="middle" font-size="22" font-weight="650">
      <text x="1007" y="141">Compare routes</text>
      <text x="1007" y="253">Find a cool place</text>
      <text x="1007" y="365">Read a safety tip</text>
    </g>
  </g>
  <text x="64" y="482" fill="#66756c" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">ShadeMates turns fragmented heat information into practical, personal choices.</text>
</svg>
